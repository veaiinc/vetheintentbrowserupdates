name: Validate appcast

# Safety gate for the Sparkle auto-update feed. Does NOT sign anything — the
# EdDSA private key never touches CI (release-mac.sh --publish stays the signer).
# It only verifies mac/appcast.xml is a feed Sparkle clients can consume, so a
# malformed or half-published release is caught before users auto-update from it.

on:
  push:
    branches: [main]
    paths:
      - 'mac/appcast.xml'
      - 'scripts/validate_appcast.py'
      - '.github/workflows/validate-appcast.yml'
  pull_request:
    paths:
      - 'mac/appcast.xml'
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate mac/appcast.xml
        run: python3 scripts/validate_appcast.py
